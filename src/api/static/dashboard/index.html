<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>stock-agent</title>

  <!-- Shared reset & tokens -->
  <link rel="stylesheet" href="/dashboard/css/reset.css" />

  <!-- Module CSS (load order = dependency order) -->
  <link rel="stylesheet" href="/dashboard/css/modules/layout.css" />
  <link rel="stylesheet" href="/dashboard/css/modules/card.css" />
  <link rel="stylesheet" href="/dashboard/css/modules/badge.css" />
  <link rel="stylesheet" href="/dashboard/css/modules/table.css" />
  <link rel="stylesheet" href="/dashboard/css/modules/form.css" />
  <link rel="stylesheet" href="/dashboard/css/modules/modal.css" />
  <link rel="stylesheet" href="/dashboard/css/modules/brief.css" />
  <link rel="stylesheet" href="/dashboard/css/modules/kpi.css" />
  <link rel="stylesheet" href="/dashboard/css/modules/attention.css" />
  <link rel="stylesheet" href="/dashboard/css/modules/chart.css" />
  <link rel="stylesheet" href="/dashboard/css/modules/decision.css" />
  <link rel="stylesheet" href="/dashboard/css/modules/leaderboard.css" />
  <link rel="stylesheet" href="/dashboard/css/modules/thesis.css" />
  <link rel="stylesheet" href="/dashboard/css/modules/watchlist.css" />
  <link rel="stylesheet" href="/dashboard/css/modules/portfolio.css" />
  <link rel="stylesheet" href="/dashboard/css/modules/layout-duo.css" />
  <link rel="stylesheet" href="/dashboard/css/modules/memory.css" />
</head>
<body>
  <div id="app">

      <header class="topbar">
        <div class="brand-block">
          <svg class="brand-logo" aria-label="stock-agent" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="8" fill="currentColor" fill-opacity=".1"/>
            <polyline points="4,22 11,14 17,18 28,8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="28" cy="8" r="2.5" fill="currentColor"/>
          </svg>
          <span class="brand-name">stock-agent</span>
        </div>
        <div class="toolbar">
          <div id="engineHeartbeat" class="engine-heartbeat heartbeat-idle" role="status" aria-live="polite" aria-label="Engine status">
            <span class="heartbeat-dot"></span><span class="heartbeat-text">Engine …</span>
          </div>
          <button id="reloadBtn" class="icon-text-btn" type="button" aria-label="Tải lại dữ liệu">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Reload
          </button>
          <button id="newThesisBtn" class="primary-btn" type="button">+ Thesis mới</button>
        </div>
      </header>

      <div id="errorBanner" class="error-banner hidden" role="alert"></div>

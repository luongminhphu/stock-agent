name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Allow cancellation on feature branches to save minutes,
  # but NEVER cancel runs on main — every commit must finish.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Lint (ruff) — fastest, fails early
  # -----------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.4.0"

      - name: Run ruff format check
        run: ruff format --check src/ tests/

      - name: Run ruff check (statistics always visible)
        run: |
          echo "=== Ruff violations by rule ==="
          ruff check src/ tests/ --statistics || true
          echo "=== Full error list ==="
          ruff check src/ tests/

  # -----------------------------------------------------------------------
  # Job 2: Type check (mypy)
  # -----------------------------------------------------------------------
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install aiosqlite  # needed for test imports during mypy

      - name: Run mypy
        run: mypy src/
        env:
          ENVIRONMENT: test
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          DISCORD_TOKEN: test-token
          PERPLEXITY_API_KEY: test-key

  # -----------------------------------------------------------------------
  # Job 3: Tests (pytest)
  # -----------------------------------------------------------------------
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" aiosqlite httpx

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60 \
            -v
        env:
          ENVIRONMENT: test
          MOCK_MARKET: "true"
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          DISCORD_TOKEN: test-token
          PERPLEXITY_API_KEY: test-key

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # -----------------------------------------------------------------------
  # Job 4: Security — detect committed .env files and real secrets
  # -----------------------------------------------------------------------
  security:
    name: Secret scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for committed .env files (by filename)
        run: |
          # Find tracked files whose name is exactly ".env" or ends with ".env"
          # Exclude .env.example explicitly
          FOUND=$(git ls-files | grep -E '(^|/)\.env$' | grep -v '\.env\.example$' || true)
          if [ -n "$FOUND" ]; then
            echo "ERROR: .env file committed to repo!"
            echo "$FOUND"
            exit 1
          fi
          echo "No .env secrets found."

      - name: Verify .env.example has no real secret values
        run: |
          if grep -E '(sk-[A-Za-z0-9]{20,}|Bearer [A-Za-z0-9]{20,}|ghp_[A-Za-z0-9]{36}|AKIA[0-9A-Z]{16}|xoxb-[0-9]+-[0-9]+-[A-Za-z0-9]+)' .env.example 2>/dev/null; then
            echo "ERROR: .env.example contains real secret patterns!"
            exit 1
          fi
          echo ".env.example clean."

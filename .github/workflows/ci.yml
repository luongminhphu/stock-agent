name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Lint (ruff) — fastest, fails early
  # -----------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.4.0"

      - name: Run ruff check
        run: ruff check src/ tests/

      - name: Run ruff format check
        run: ruff format --check src/ tests/

  # -----------------------------------------------------------------------
  # Job 2: Type check (mypy)
  # -----------------------------------------------------------------------
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install aiosqlite  # needed for test imports during mypy

      - name: Run mypy
        run: mypy src/
        env:
          ENVIRONMENT: test
          DATABASE_URL: 'sqlite+aiosqlite:///:memory:'
          DISCORD_TOKEN: test-token
          PERPLEXITY_API_KEY: test-key

  # -----------------------------------------------------------------------
  # Job 3: Tests (pytest)
  # -----------------------------------------------------------------------
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" aiosqlite httpx

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60 \
            -v
        env:
          ENVIRONMENT: test
          MOCK_MARKET: "true"
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          DISCORD_TOKEN: test-token
          PERPLEXITY_API_KEY: test-key

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # -----------------------------------------------------------------------
  # Job 4: Security — secret scanning on changed files
  # -----------------------------------------------------------------------
  security:
    name: Secret scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for committed secrets (.env files)
        run: |
          if git grep -rn --include="*.env" -l . | grep -v '.env.example'; then
            echo "ERROR: .env file committed to repo!"
            exit 1
          fi
          echo "No .env secrets found."

      - name: Verify .env.example has no real values
        run: |
          if grep -E '(sk-|Bearer |ghp_|AKIA|xoxb-)' .env.example 2>/dev/null; then
            echo "ERROR: .env.example contains real secret patterns!"
            exit 1
          fi
          echo ".env.example clean."
